# render.yaml
services:
  - type: web
    name: ml-ops-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile.dashboard
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTO_APPROVE
        value: "1"

  - type: web
    name: ml-ops-fraud-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn fraud_detection.main:app --host 0.0.0.0 --port 8000
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-db
          property: connectionString

databases:
  - name: mlops-db
    plan: free